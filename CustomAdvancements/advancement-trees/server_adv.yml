options:
  auto_active: true
  rewards:
    command:
      type: consolecommand
      value: broadcast 恭喜%player_name%完成了服务器的所有成就！
  display_name: 服务器成就
  description: '&e服务器专属成就呦'
  item: GOLD_BLOCK
