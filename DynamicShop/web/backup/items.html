<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品目录 - DynamicShop</title>
    <meta name="description" content="浏览所有商店物品及当前价格">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">💎</span>
            <span class="brand-text">DynamicShop</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <span class="nav-icon">📊</span> 仪表板
            </a>
            <a href="items.html" class="nav-link active">
                <span class="nav-icon">🛒</span> 物品目录
            </a>
            <a href="admin.html" class="nav-link">
                <span class="nav-icon">⚡</span> 管理
            </a>
        </div>
        <div class="nav-actions">
            <span class="item-count" id="itemCount">-- 个物品</span>
        </div>
    </nav>

    <!-- 英雄区 -->
    <header class="hero items-hero">
        <div class="hero-content">
            <h1 class="hero-title">物品目录</h1>
            <p class="hero-subtitle">浏览所有商店物品及当前价格</p>
            <div class="search-container">
                <input type="text" id="searchInput" class="hero-search" placeholder="搜索物品...">
            </div>
        </div>
        <div class="hero-glow"></div>
    </header>

    <div class="container">
        <!-- 分类选项卡 -->
        <section class="category-section glass">
            <div class="category-tabs" id="categoryTabs">
                <button class="category-btn active" data-category="">全部物品</button>
                <div class="loading-spinner" style="width: 20px; height: 20px;"></div>
            </div>
        </section>

        <!-- 物品网格 -->
        <section class="items-section">
            <div class="items-header">
                <span class="items-showing" id="itemsShowing">显示 -- 个物品</span>
                <div class="filter-options">
                    <label class="filter-checkbox">
                        <input type="checkbox" id="hideOutOfStock">
                        <span class="checkmark"></span>
                        隐藏缺货物品
                    </label>
                    <select id="sortSelect" class="filter-select">
                        <option value="name">按名称排序</option>
                        <option value="buyPrice">按购买价排序</option>
                        <option value="sellPrice">按出售价排序</option>
                        <option value="stock">按库存排序</option>
                    </select>
                </div>
            </div>
            <div class="items-grid" id="itemsGrid">
                <div class="loading-spinner"></div>
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>DynamicShop v2.0 · 由 selfservice0 制作 · <a href="https://minecraftsmp.org" target="_blank">MinecraftSMP</a>
        </p>
    </footer>

    <!-- 物品详情模态框 -->
    <div id="itemModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modalItemName">物品详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody" class="modal-body">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script src="items.js"></script>
</body>

</html>
