        economy-plugin: Vault
        amount: '%mcwws.price_buy_heart_of_the_sea%'
        placeholder: '{amount}$'
        start-apply: 0
    sell-prices:
      1:
        economy-plugin: Vault
        amount: '%mcwws.price_sell_heart_of_the_sea%'
        placeholder: '{amount}$'
        start-apply: 0
  C:
    price-mode: CLASSIC_ALL
    product-mode: CLASSIC_ALL
    products:
      1:
        material: NAUTILUS_SHELL
        amount: 1
    buy-prices:
      1:
        economy-plugin: Vault
        amount: '%mcwws.price_buy_nautilus_shell%'
