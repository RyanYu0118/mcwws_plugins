# ================================================================
# AUTOMATIC CATEGORY RESTOCK
# ================================================================
# Periodically resets stock for all items in a category to a target level.
# Useful for ensuring essential items always remain available.
restock:
  enabled: true
  rules:
  - category: MISC
    stock: 200
    interval-minutes: 1

# Valid categories: MISC, BLOCKS, REDSTONE, TOOLS, ARMOR, FOOD, FARMING, WOOD
# Also supports custom categories: CUSTOM_1 through CUSTOM_10

# ================================================================
# SPECIAL SHOP ITEMS (permissions and server-shop)
# ================================================================
# These are added dynamically via /shopadmin commands
# Format is automatically generated
special_items: {}
