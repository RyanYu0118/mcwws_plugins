help-message:
  - "<gold>指令列表：</gold>"
  - "<green>/bags reload</green> - <gold>重载插件配置文件</gold>"
  - "<green>/bags save</green> - <gold>手动保存所有玩家数据</gold>"
  - "<green>/bags clear <target></green> - <gold>清空指定玩家的背包</gold>"
  - "<green>/bags level <target> <level></green> - <gold>设置指定玩家的背包等级</gold>"
  - "<green>/bags give <target></green> - <gold>向指定玩家发放背包</gold>"
  - "<green>/bags sell-all <target> <ignore-item-value></green> - <gold>出售指定玩家的所有物品</gold>"
  - "<green>/bags multiplier <target> <multiplier></green> - <gold>设置指定玩家的物品出售倍率</gold>"
  - "<green>/bags open <target></green> - <gold>打开指定玩家的背包界面</gold>"
  - "<green>/bags help</green> - <gold>查看插件所有指令帮助</gold>"
bag-upgrade:
  success: "<green>背包升级成功！从<gold>%old%</gold>级升至<gold>%new%级</gold>，消耗<gold>%cost%</gold>$。"
  fail: "<red>背包升级失败！资金不足，升级至<gold>%new%级</gold>还需<gold>%cost%</gold>$</red>"