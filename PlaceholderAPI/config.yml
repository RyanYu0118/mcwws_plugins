# PlaceholderAPI
# Version: 2.11.2
# Created by: extended_clip
# Contributors: https://github.com/PlaceholderAPI/PlaceholderAPI/graphs/contributors
# Issues: https://github.com/PlaceholderAPI/PlaceholderAPI/issues
# Expansions: https://api.extendedclip.com/all/
# Wiki: https://github.com/PlaceholderAPI/PlaceholderAPI/wiki
# Discord: https://helpch.at/discord
# No placeholders are provided with this plugin by default.
# Download placeholders: /papi ecloud
check_updates: true
cloud_enabled: true
cloud_sorting: name
cloud_allow_unverified_expansions: false
boolean:
  'true': 'yes'
  'false': 'no'
date_format: MM/dd/yy HH:mm:ss
debug: false
expansions:
  player:
    ping_value:
      high: 100
      medium: 50
    direction:
      north: N
      south: S
      north_west: NW
      north_east: NE
      east: E
      south_east: SE
      west: W
      south_west: SW
    ping_color:
      medium: '&e'
      high: '&c'
      low: '&a'
  server:
    tps_color:
      high: '&a'
      low: '&c'
      medium: '&e'
    server_name: A Minecraft Server
    time:
      locale: zh-CN
      zone: Asia/Shanghai
      suffix:
        week: w
        day: d
        hour: h
        minute: m
        second: s
  string:
    replacements:
      small-numbers:
        '0': ₀
        '1': ₁
        '2': ₂
        '3': ₃
        '4': ₄
        '5': ₅
        '6': ₆
        '7': ₇
        '8': ₈
        '9': ₉
    separator: _
  math:
    Disable-Warnings: false
    Rounding: half-up
    Decimals: 3
    Debug: false
  vault:
    formatting:
      thousands: k
      trillions: T
      quadrillions: Q
      billions: B
      millions: M
  javascript:
    enable_parse_command: false
    debug: false
    github_script_downloads: false
    argument_split: ','
    use_quick_js: false
  checkitem:
    give_enabled: true
    remove_enabled: true
  formatter:
    formatting:
      pattern: '#,###,###.##'
      locale: en-US
    shorten:
      trillions: T
      quadrillions: Q
      billions: B
      millions: M
      thousands: K
      pattern: '###.#'
      rounding_mode: half-up
    time:
      seconds: s
      milliseconds: ms
      days: d
      hours: h
      condensed: false
      minutes: m
      includeZeroSeconds: false
      includeZeroDays: false
      includeZeroMinutes: false
      includeZeroHours: false
      includeZeroMilliseconds: false
    rounding:
      mode: half-up
      precision: 0
  progress:
    in_progress: '&e■'
    length: 10
    completed: '&a■'
    maximum_value: 100
    decimal: 2
    remaining: '&7■'
    full: '&aCompleted'
    replace_placeholder:
    - ',;.'
  playerlist:
    offline-text: Offline
    argument-separator: ','
    lists:
      staff:
        type: ONLINE
        included: true
        filters:
        - PERMISSION:group.staff
        - CANSEE
    groups:
      staffAndPlayers:
        gap: 1
        lists:
          staff:
            title: Staff Members (%amount%)
            max: 10
            remaining: '... and %remaining% more!'
          players:
            title: Players (%amount%)
