#陆生/水生植物
  '1':
    material: vine
    #enchantments:
    #  - ARROW_DAMAGE;1
    hide_enchantments: true
    slot: 0
    update: true
    priority: 1
    hide_attributes: true
    #display_name: '&b更改手持物品信息'
    lore:
      - ''
      - '&e购买 ¥2.00/件'
      - '&e回收 ¥1.60/件'
      - ''
      - '&a左键点击 &7| &f购买一件'
      - '&a右键点击 &7| &f购买一组'
      - '&aShift+左键点击 &7| &f购买自定义件数（&3%objective_score_number%&f件）'
      - '&bShift+右键点击 &7| &f一键回收您身上&3%checkitem_amount_mat:vine,strict%&f件该物品'
      - '&e(点击下方书与笔可更改预设数量)'
      - ''
      - '&6当前您的零钱为：¥%vault_eco_balance_2dp%'
    left_click_commands:
      - '[takemoney] 2'
      - '[console] execute run give %player_name% minecraft:vine 1'
      - '[sound] entity_item_pickup 1 1.2'
    left_click_requirement:
      requirements:
        money:
          type: has money
          amount: 2
      deny_commands:
        - '[message] &c啊哦，你零钱不够捏......'
        - '[sound] ENTITY_ENDERMAN_TELEPORT 1 0.1'
        - '[close]'
    right_click_commands:
      - '[takemoney] 128'
      - '[console] execute run give %player_name% minecraft:vine 64'
      - '[sound] entity_item_pickup 1 1.2'
    right_click_requirement:
      requirements:
        money:
          type: has money
          amount: 128
      deny_commands:
        - '[message] &c啊哦，你零钱不够捏......'
        - '[sound] ENTITY_ENDERMAN_TELEPORT 1 0.1'
        - '[close]'
    shift_left_click_commands:
      - '[takemoney] %objective_score_number%'
      - '[console] execute run give %player_name% minecraft:vine %objective_score_number%'
      - '[sound] entity_item_pickup 1 1.2'
    shift_left_click_requirement:
      requirements:
        money:
          type: javascript
          expression: '%math_2*{objective_score_number}% <= %vault_eco_balance%'
      deny_commands:
        - '[message] &c啊哦，你零钱不够捏......'
        - '[sound] ENTITY_ENDERMAN_TELEPORT 1 0.1'
        - '[close]'
    shift_right_click_commands:
      - '[givemoney] %math_1.6*{checkitem_amount_mat:vine}%'
      - '[console] %checkitem_remove_mat:vine,strict%'
      - '[sound] block_grindstone_use 1 0.1'
    shift_right_click_requirement:
      requirements:
        money:
          type: javascript
          expression: '%checkitem_amount_mat:vine,strict% > 0'
      deny_commands:
        - '[message] &c啊哦，你身上没这个物品捏......'
        - '[sound] ENTITY_ENDERMAN_TELEPORT 1 0.1'
