settings:
  menu: 'daily-shop-menu'
  buy-more: true
  shop-name: '{lang:daily-shop-name}'
  hide-message: false
  secret-shop-items: true
  allow-favourite: false

general-configs:
  price-mode: CLASSIC_ANY
  product-mode: CLASSIC_ANY
  sell-limits:
    global: 640
    default: 18
    vip: 256
  sell-limits-conditions:
    vip:
      1:
        type: permission
        permission: 'group.vip'
  sell-times-reset-mode: 'COOLDOWN_TIMED'
  sell-times-reset-time: '{random_reset}'

items:
  A:
    products:
      1:
        material: REDSTONE
        amount: 1
    sell-prices:
      1:
        economy-plugin: Vault
        amount: '%mcwws.price_sell_redstone%'
        placeholder: '&6{amount} Coins'
        start-apply: 0
