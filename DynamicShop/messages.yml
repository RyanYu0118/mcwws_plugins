# ================================================================
# 翻译指南
# ================================================================
# 要将此文件翻译为其他语言：
# 1. 翻译冒号后面的文本（保持 {占位符} 不变）
# 2. 保留颜色代码（&a、&c 等）或根据需要修改
# 3. 不要修改消息键（冒号前面的内容）
#
# 示例西班牙语翻译：
# purchase-success: "&aCompraste &e{item} &apor &e{price}&a!"
# ================================================================

# ================================================================
# 颜色代码参考
# ================================================================
# &0 = 黑色          &8 = 深灰色
# &1 = 深蓝色        &9 = 蓝色
# &2 = 深绿色        &a = 绿色
# &3 = 深青色        &b = 青色
# &4 = 深红色        &c = 红色
# &5 = 深紫色        &d = 浅紫色
# &6 = 金色          &e = 黄色
# &7 = 灰色          &f = 白色
#
# &l = 粗体          &o = 斜体
# &n = 下划线        &m = 删除线
# &k = 乱码          &r = 重置
# ================================================================