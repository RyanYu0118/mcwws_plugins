#1 一键整理背包/物品栏/箱子
  'chestsort':
    material: barrel
    slot: 0
    priority: 1
    update: true
    hide_attributes: true
    display_name: '&b▶ 一键整理背包/物品栏/箱子'
    lore:
      - ''
      - '&a&o- 自动整理、分类和堆叠背包/物品栏/箱子中的物品'
      - '&a&o- 专业治疗强迫症'
      - ''
      - '%changeoutput_equals_input:{luckperms_has_permission_chestsort.*}_matcher:yes_ifmatch:&e当前剩余时长：&a{luckperms_expiry_time_chestsort.*}_else:&7未激活%%changeoutput_equals_input:{luckperms_has_permission_chestsort.*}{luckperms_expiry_time_chestsort.*}_matcher:yes_ifmatch:&a∞_else:%'
      - '%changeoutput_equals_input:{luckperms_has_permission_chestsort.*}{luckperms_expiry_time_chestsort.*}_matcher:yes_ifmatch:_else:&e请在下方选择生效时长 {animations_<flash>↓</flash>}%'
  'chestsort_choice1':
    material: lime_dye
    enchantments:
      - ARROW_DAMAGE;1
    slot: 9
    priority: 1
    update: true
    hide_attributes: true
    hide_enchantments: true
    view_requirement:
      requirements:
        a:
          type: "!string equals"
          input: "%luckperms_expiry_time_chestsort.*%%luckperms_has_permission_chestsort.*%"
          output: "yes"
          #意思是检测不到永久性的该权限就会显示此物品
    display_name: '&a▶ 两小时'
    lore:
      - '&c注：此操作会覆盖当前比购买时长小的剩余有效时长'
      - '&c   当购买时长小于剩余有效时长时将不起任何作用！'
      - '&e¥60/次'
    left_click_commands:
      - '[console] lp user %player_name% permission settemp chestsort.* true 2h replace'
      - '[takemoney] 60'
      - '[sound] entity_experience_orb_pickup 1 0.5'
      - '[refresh]<delay=10>'
    left_click_requirement:
      requirements:
        money:
          type: has money
          amount: 60
      deny_commands:
        - '[message] &c啊哦，你零钱不够捏......'
        - '[sound] ENTITY_ENDERMAN_TELEPORT 1 0.1'
        - '[refresh]<delay=10>'
