      message:
        type: message
        value: '&6破坏了50个方块！！！'
      command:
        type: consolecommand
        value: give %player% golden_apple 1
    requirements:
      #advancement:
       # type: advancement
       # value: example.welcome
    display:
      name: 汗牛塞屋
      item: BUNDLE
      description: 背包腾不了一点出来
      gui_location: '1:0'
      guiLocation: auto
      unit: 破坏方块
      minecraft-gui-frame: "CHALLENGE"
      minecraft-toast: true
      minecraft-chat-announce: true
  breaktree:
    type: BlockBreak
    value: OAK_LOG,ACACIA_LOG,SPRUCE_LOG
    amount: 10
    rewards:
      message:
        type: message
        value: '&2你完成了破坏树木的成就'
    display:
