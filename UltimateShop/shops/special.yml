settings:
  menu: 'example-shop-menu'
  buy-more: true
  shop-name: '{lang:special-items-shop-name}'
  hide-message: false
  secret-shop-items: true
  allow-favourite: true

items:
  A:
    price-mode: CLASSIC_ALL
    product-mode: CLASSIC_ALL
    products:
      1:
        material: EXPERIENCE_BOTTLE
        amount: 1
    buy-prices:
      1:
        economy-plugin: Vault
        amount: '%mcwws.price_buy_experience_bottle%'
        placeholder: '{amount}$'
        start-apply: 0
    sell-prices:
      1:
        economy-plugin: Vault
        amount: '%mcwws.price_sell_experience_bottle%'
        placeholder: '{amount}$'
        start-apply: 0
  B:
    price-mode: CLASSIC_ALL
    product-mode: CLASSIC_ALL
