  - '[sound] ENTITY_VILLAGER_AMBIENT 1 1.7'
update_interval: 1
#inventory_type: hopper
items:
  '0':
    material: writable_book
    enchantments:
      - ARROW_DAMAGE;1
    hide_enchantments: true
    slot: 49
    update: true
    priority: 1
    update: true
    hide_attributes: true
    display_name: '&b更改商品预设数量'
    lore: 
    - '&e当前您的预设数量：%objective_score_number%件'
    left_click_commands:
      - '[givepermission] commandprompter.*'
      - '[givepermission] minecraft.command.scoreboard'
      - '[givepermission] minecraft.command.gamerule'
      - '[givepermission] minecraft.command.playsound'
      - '[givepermission] minecraft.command.schedule'
      - '[givepermission] luckperms.user.permission.unset'
      #- '[player] ap use number'
      - '[close]'
      - '[player] scoreboard players set %player_name% number <&a请在聊天框中输入有效数字（取消请回复"x"）> <-exa gamerule sendCommandFeedback false> <-exa playsound ui.cartography_table.take_result player %player_name% ~ ~ ~ 1 1 1> <-exa menu_npc_florist2> <-exa schedule function economic_system:feedback 1s replace> <-exa lp user %player_name% permission unset minecraft.command.scoreboard> <-exa lp user %player_name% permission unset minecraft.command.gamerule> <-exa lp user %player_name% permission unset minecraft.command.playsound> <-exa lp user %player_name% permission unset minecraft.command.schedule> <-exa lp user %player_name% permission unset luckperms.user.permission.unset>'
      - '[sound] entity_snow_golem_death 1 1'
  '00':
    material: lime_stained_glass_pane
    model_data: 2200007
    slot: 47
    update: true
    priority: 1
    update: true
